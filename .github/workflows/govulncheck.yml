name: govulncheck

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  schedule:
    # Weekly run on Mondays at 07:23 UTC to surface new advisories that
    # may affect a tagged release even when no code changes land.
    - cron: '23 7 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run govulncheck
        # Shared with the `govulncheck` makefile target so local and CI runs
        # apply the same allowlist gate (.github/govulncheck-allowlist.txt).
        run: ./scripts/govulncheck-gate.sh
