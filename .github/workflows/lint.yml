name: Lint

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pin to a known-good release of golangci-lint so the lint rules
          # don't silently change underneath us. The default linter set
          # (errcheck, gosimple, govet, ineffassign, staticcheck, unused)
          # is sufficient for this codebase.
          version: v2.12.2
          args: --timeout=5m
          # Invalidate daily to avoid stale cache entries from before the
          # repo was renamed (older cache hits surfaced phantom gosec
          # findings whose `//nolint:gosec` suppressions couldn't be
          # applied because the cached absolute paths no longer existed).
          cache-invalidation-interval: "1"
