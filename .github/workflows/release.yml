name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Run tests
        run: go test ./...

      - name: Determine next tag
        id: version
        env:
          BUMP: ${{ github.event.inputs.bump || 'patch' }}
        run: |
          set -euo pipefail

          git fetch --force --tags

          current_tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)
          if [ -n "$current_tag" ]; then
            echo "Current commit already has release tag $current_tag; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=$current_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1 || true)
          bump="${BUMP:-patch}"

          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS=. read -r major minor patch <<< "$version"

            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "::error::Unsupported bump value: $bump"
                exit 1
                ;;
            esac

            next_tag="v${major}.${minor}.${patch}"
          fi

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "::error::Computed tag already exists: $next_tag"
            exit 1
          fi

          echo "Next release tag: $next_tag"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      # Build the packages before tagging/releasing so a packaging failure
      # cannot leave a pushed tag without a release.
      - name: Build RPM packages
        if: steps.version.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          for arch in amd64 arm64; do
            make rpm VERSION="$version" GOARCH="$arch"
          done

          echo "Built packages:"
          ls -1 dist/*.rpm

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag \
            dist/*.rpm

